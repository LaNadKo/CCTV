<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65ffa0"/>
      <stop offset="100%" stop-color="#48d1cc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Camera body -->
  <rect x="100" y="160" width="230" height="180" rx="24" fill="url(#accent)" opacity="0.9"/>
  <!-- Lens -->
  <circle cx="215" cy="250" r="55" fill="#0f172a" opacity="0.7"/>
  <circle cx="215" cy="250" r="35" fill="url(#accent)" opacity="0.5"/>
  <circle cx="215" cy="250" r="15" fill="#0f172a" opacity="0.8"/>
  <!-- Recording indicator -->
  <circle cx="290" cy="195" r="12" fill="#ff4444"/>
  <!-- Signal waves -->
  <path d="M370 200 Q400 250 370 300" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M395 180 Q435 250 395 320" stroke="url(#accent)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- AI eye -->
  <path d="M160 390 Q256 430 352 390 Q256 450 160 390Z" fill="url(#accent)" opacity="0.3"/>
  <circle cx="256" cy="410" r="10" fill="url(#accent)" opacity="0.7"/>
</svg>
